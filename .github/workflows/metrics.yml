name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: noobcoder1982

          # 🎨 Layout & base
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 20
          config_theme: dark

          # 📅 Contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 📊 Languages
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes

          # 🔥 Habits / commit patterns
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          # 📈 Activity
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14

          # 🧠 Topics / tech stack
          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_sort: stars

          # 📌 Repositories
          plugin_repositories: yes
          plugin_repositories_pinned: 6

          # ⭐ Stats
          plugin_stars: yes

          # 🏆 Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C

          # 🚀 PageSpeed (your setup)
          plugin_pagespeed: yes
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_API }}
          plugin_pagespeed_url: https://vinl.tech
          plugin_pagespeed_strategy: desktop, mobile
          plugin_pagespeed_categories: performance, accessibility, best-practices, seo
