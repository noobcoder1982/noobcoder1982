name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      # 🧠 MAIN HEADER
      - name: Header metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: noobcoder1982

          template: classic
          base: header, community, repositories, metadata
          config_display: large
          config_padding: 20
          config_theme: github_dark

      # 🔥 ACTIVITY + HABITS
      - name: Activity metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: noobcoder1982

          base: activity
          config_theme: github_dark

          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_limit: 5

          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_charts: yes

          plugin_isocalendar: yes

      # 📊 LANGUAGES + TECH
      - name: Language metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: noobcoder1982

          base: ""
          config_theme: github_dark

          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_indepth: yes

          plugin_topics: yes
          plugin_topics_limit: 15

      # 🚀 PAGESPEED BLOCK
      - name: PageSpeed metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-pagespeed.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: noobcoder1982

          base: ""
          config_theme: github_dark

          plugin_pagespeed: yes
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_API }}
          plugin_pagespeed_url: https://vinl.tech
          plugin_pagespeed_strategy: desktop, mobile
