name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/metrics.yml"
      - "README.md"

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      # 🔥 HEADER (ultra clean + fast)
      - name: Header metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: noobcoder1982

          template: classic
          base: header
          config_display: large
          config_padding: 20

      # ⚡ ACTIVITY PANEL (left top)
      - name: Activity metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: noobcoder1982

          base: activity

          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 7

          plugin_habits: yes
          plugin_habits_days: 7
          plugin_habits_charts: yes

          plugin_isocalendar: yes

      # 🧠 LANGUAGES PANEL (right top)
      - name: Language metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: noobcoder1982

          base: ""

          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_indepth: yes

          plugin_topics: yes
          plugin_topics_limit: 12

      # 🧩 EXTRA PANEL (left bottom)
      - name: Extra metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-extra.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: noobcoder1982

          base: ""

          plugin_stars: yes
          plugin_lines: yes

      # 📊 STATS PANEL (right bottom - replaces pagespeed cleanly)
      - name: Stats metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-stats.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: noobcoder1982

          base: repositories
