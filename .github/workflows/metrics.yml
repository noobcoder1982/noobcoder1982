name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub metrics (dashboard)
        uses: lowlighter/metrics@latest
        with:
          # NOTE: use a Classic PAT in METRICS_TOKEN (fine-grained PATs may fail)
          token: ${{ secrets.METRICS_TOKEN }}
          user: noobcoder1982
          filename: github-metrics.svg

          template: classic
          base: header, activity, community, repositories, metadata
          config_display: large
          config_animations: yes

          # Languages
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 12

          # Recent activity
          plugin_activity: yes
          plugin_activity_limit: 15
          plugin_activity_days: 30

          # Habits
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes

          # Isometric calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # PageSpeed
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://brewedframe.me
          plugin_pagespeed_detailed: true
          plugin_pagespeed_screenshot: true
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_API }}
